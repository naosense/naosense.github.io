<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>充电分析报告</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-D4YST94BJZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-D4YST94BJZ');
</script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f5f9;
  --card: #ffffff;
  --subtle: #f8f9fc;
  --border: #e6e9f0;
  --border-strong: #d0d5dd;
  --cyan: #009ef7;
  --cyan-light: rgba(0, 158, 247, 0.07);
  --cyan-dim: rgba(0, 158, 247, 0.7);
  --coral: #f15b5b;
  --coral-light: rgba(241, 91, 91, 0.06);
  --green: #00b383;
  --green-light: rgba(0, 179, 131, 0.08);
  --amber: #e8912e;
  --text: #0d111c;
  --text-dim: #5a6577;
  --text-faint: #9ca3af;
  --display: 'Orbitron', 'Noto Sans SC', sans-serif;
  --mono: 'Share Tech Mono', 'Noto Sans SC', monospace;
  --body: 'Noto Sans SC', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-weight: 300;
  line-height: 1.7;
  letter-spacing: 0.02em;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ===== Upload / Hero ===== */
.upload-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 90vh;
  background: var(--card);
  position: relative;
  overflow: hidden;
}
.upload-section::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 1px; background: var(--border);
}
.upload-section .hero-text {
  display: flex; flex-direction: column; justify-content: center;
  padding: 80px clamp(40px, 5vw, 80px);
}
.upload-section .hero-text h1 {
  font-family: var(--display);
  font-size: clamp(38px, 4.5vw, 54px);
  font-weight: 700;
  letter-spacing: 0.05em;
  line-height: 1.15;
  margin-bottom: 14px;
  color: var(--text);
}
.upload-section .hero-text p {
  font-size: 16px; color: var(--text-dim);
  line-height: 1.7; max-width: 380px;
  margin-bottom: 40px;
}
.upload-area {
  display: inline-flex; align-items: center; gap: 20px;
  padding: 16px 24px;
  border: 1.5px dashed var(--border);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.25s;
}
.upload-area:hover {
  border-color: var(--cyan);
  background: var(--cyan-light);
}
.upload-btn {
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
}
.upload-btn::before {
  content: '↑';
  width: 40px; height: 40px;
  border-radius: 12px;
  background: var(--cyan-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--cyan);
  flex-shrink: 0;
}
.upload-btn .label { font-size: 15px; font-weight: 600; color: var(--text); }
.upload-btn.loading { opacity: .6; pointer-events: none; }
#fileInput { display: none; }
.file-name { font-size: 12px !important; color: var(--text-faint) !important; display: block; margin-top: 2px; }
.settings-row {
  display: flex; gap: 8px; margin-top: 16px; flex-wrap: nowrap;
}
.settings-row label {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  background: var(--bg);
  border-radius: 8px;
  font-size: 12px; color: var(--text-faint);
}
.settings-row label b {
  display: inline-flex;
  flex-direction: column;
  font-weight: inherit;
  line-height: 1.3;
}
.settings-row label b span {
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
}
.settings-row input {
  font-family: var(--mono);
  font-size: 13px;
  width: 56px;
  padding: 2px 4px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: transparent;
  text-align: center;
  color: var(--text);
}
.settings-row input:focus {
  outline: none;
  border-color: var(--cyan);
}
/* Hero right (stats) - built as hero-visual div */
.upload-section .hero-visual {
  display: flex; flex-direction: column; justify-content: center;
  padding: 60px 48px;
  position: relative;
}
.upload-section .hero-visual::before {
  content: '';
  position: absolute; left: 0; top: 15%; bottom: 15%;
  width: 1px;
  background: linear-gradient(180deg, transparent, var(--border), transparent);
}
.badge-pill {
  display: inline-flex; align-items: center;
  padding: 5px 16px;
  background: var(--cyan-light);
  border-radius: 100px;
  font-family: var(--display);
  font-size: 11px; font-weight: 600; color: var(--cyan);
  letter-spacing: 0.1em;
  width: fit-content;
  margin-bottom: 20px;
}
.stat-hero { text-align: right; }
.stat-hero .number {
  font-family: var(--display);
  font-size: clamp(72px, 8vw, 100px);
  font-weight: 700;
  letter-spacing: -2px;
  line-height: 0.9;
  color: var(--text);
  margin-bottom: 6px;
}
.stat-hero .unit {
  font-size: 18px; font-weight: 500;
  color: var(--text-dim);
  margin-bottom: 20px;
}
.stat-hero .meta-row {
  display: flex; justify-content: flex-end; gap: 24px;
}
.stat-hero .meta-item { text-align: right; }
.stat-hero .meta-item .val {
  font-family: var(--mono);
  font-size: 22px; font-weight: 600;
}
.stat-hero .meta-item .val.cyan { color: var(--cyan); }
.stat-hero .meta-item .val.green { color: var(--green); }
.stat-hero .meta-item .val.coral { color: var(--coral); }
.stat-hero .meta-item .lbl {
  font-size: 11px; color: var(--text-faint);
  font-family: var(--display);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-top: 2px;
}

/* ===== Report Container ===== */
.report {
  max-width: 1200px; margin: 0 auto; padding: 0 24px 32px;
  display: none;
}
.report.visible { display: block; }

/* ===== Section Headers ===== */
.section-title {
  font-family: var(--display);
  font-size: 22px; font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--text);
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.section-title .badge {
  font-family: var(--body);
  font-size: 13px; font-weight: 400;
  color: var(--text-dim);
  background: var(--subtle);
  padding: 2px 12px;
  border-radius: 20px;
}

/* ===== Stats Grid ===== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.02);
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.stat-card:hover {
  box-shadow: 0 8px 24px rgba(0,0,0,0.04);
  border-color: var(--border-strong);
}
.stat-card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--cyan);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}
.stat-card:hover::after { transform: scaleX(1); }
.stat-card .label {
  font-size: 11px; font-weight: 500;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-family: var(--display);
  margin-bottom: 4px;
}
.stat-card .value {
  font-family: var(--mono);
  font-size: 30px;
  font-weight: 400;
  line-height: 1.1;
  color: var(--text);
  letter-spacing: -0.5px;
}
.stat-card .value.cyan { color: var(--cyan); }
.stat-card .value.green { color: var(--green); }
.stat-card .value.coral { color: var(--coral); }
.stat-card .sub {
  font-size: 12px; color: var(--text-dim);
  margin-top: 2px; font-weight: 400;
}

/* ===== Table Wrap ===== */
.table-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.02);
}
.table-wrap table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.table-wrap thead th {
  font-family: var(--display);
  font-size: 11px; font-weight: 600;
  color: var(--text-faint);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 14px 16px;
  text-align: center;
  border-bottom: 1.5px solid var(--border);
  background: var(--subtle);
  position: sticky; top: 0;
}
.table-wrap thead th:first-child { text-align: left; padding-left: 20px; }
.table-wrap thead th:last-child { padding-right: 20px; }
.table-wrap td {
  padding: 12px 16px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 13px;
  transition: background 0.15s;
}
.table-wrap td:first-child { text-align: left; padding-left: 20px; color: var(--text); font-weight: 500; }
.table-wrap td:last-child { padding-right: 20px; }
.table-wrap tbody tr:last-child td { border-bottom: none; }
.table-wrap tbody tr:hover td { background: var(--subtle); }
.table-wrap .td-label { font-weight: 600; color: var(--text); text-align: left; }
.table-wrap .note {
  font-size: 12px; color: var(--text-faint);
  padding: 10px 20px;
  border-top: 1px solid var(--border);
  background: var(--subtle);
}

/* Heat colors */
.cell-slow { color: var(--coral) !important; font-weight: 500; }
.cell-mid-slow { color: var(--amber) !important; }
.cell-mid { color: #5a8db8 !important; }
.cell-fast { color: var(--green) !important; font-weight: 500; }

/* ===== Chart Grid & Box ===== */
.chart-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 20px;
  margin-bottom: 24px;
}
.chart-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.02);
  transition: box-shadow 0.2s;
}
.chart-box:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.04); }
.chart-box h3 {
  font-family: var(--display);
  font-size: 12px; font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 18px;
}

/* ===== Station Grid ===== */
.station-grid {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 24px;
}
.station-item {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  transition: all 0.2s;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.02);
}
.station-item:hover {
  border-color: var(--cyan);
  box-shadow: 0 4px 20px rgba(0, 158, 247, 0.06);
}
.station-item .name { font-size: 14px; font-weight: 500; color: var(--text); }
.station-item .meta { font-size: 12px; color: var(--text-faint); margin-top: 2px; }
.station-item .meta strong { color: var(--cyan); font-size: 14px; font-weight: 600; font-family: var(--mono); }

/* ===== Alerts ===== */
.alert {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 18px;
  border-radius: 10px;
  font-size: 13px;
  margin-bottom: 12px;
  line-height: 1.5;
}
.alert.info {
  background: var(--cyan-light);
  border: 1px solid rgba(0, 158, 247, 0.12);
  color: #0069a8;
}
.alert.warn {
  background: var(--coral-light);
  border: 1px solid rgba(241, 91, 91, 0.12);
  color: #b33a3a;
}

/* ===== Error ===== */
.error-msg {
  background: var(--coral-light);
  border: 1px solid rgba(241, 91, 91, 0.2);
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  color: #b33a3a;
  margin-bottom: 24px;
  font-size: 14px;
}

/* ===== No Data ===== */
.no-data {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 40px;
  text-align: center;
  color: var(--text-faint);
  margin-bottom: 24px;
  font-size: 14px;
}
.no-data strong { color: var(--text-dim); }

/* ===== Loading ===== */
.loading-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(8px);
  z-index: 100;
  justify-content: center; align-items: center;
}
.loading-overlay.visible { display: flex; }
.loading-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 48px;
  text-align: center;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-box p { color: var(--text-dim); font-size: 14px; }

/* ===== Modal ===== */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  z-index: 200;
}
.modal-overlay.visible { display: block; }
.modal {
  display: none;
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: 201;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 640px; max-width: 92vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  max-height: 85vh; overflow-y: auto;
}
.modal table { width: 100%; border-collapse: collapse; font-size: 13px; }
.modal thead th {
  padding: 6px 8px; text-align: left;
  border-bottom: 1.5px solid var(--border);
  font-size: 11px; color: var(--text-faint);
  font-family: var(--display); text-transform: uppercase; letter-spacing: 0.5px;
}
.modal tbody td {
  padding: 8px; text-align: right;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim); font-size: 13px;
}
.modal tbody td:first-child { text-align: left; }
.modal tbody tr:last-child td { border-bottom: none; }

/* ===== Responsive ===== */
@media (max-width: 900px) {
  .upload-section { grid-template-columns: 1fr; min-height: auto; }
  .upload-section .hero-text { padding: 60px 32px; }
  .upload-section .hero-visual { padding: 0 32px 48px; }
  .upload-section .hero-visual::before { display: none; }
  .stats-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 640px) {
  .upload-section .hero-text { padding: 40px 20px; }
  .upload-section .hero-visual { padding: 0 20px 40px; }
  .hero-text h1 { font-size: 28px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
    .chart-grid { grid-template-columns: 1fr; }
  .settings-row { flex-direction: column; align-items: stretch; }
  .stat-hero .meta-row { flex-wrap: wrap; gap: 12px; }
}
</style>
</head>
<body>

<!-- Upload -->
<div class="upload-section">
  <div class="hero-text">
    <div class="badge-pill">ANALYTICS · EV CHARGING REPORT</div>
    <h1>充电分析报告</h1>
    <p>上传充电记录 Excel，自动分析行程充电、SOC 曲线、充电站偏好与慢充校准</p>

    <div class="upload-area" id="uploadArea">
      <label class="upload-btn" id="uploadBtn" for="fileInput">
        <span class="label">上传充电记录</span>
        <span class="file-name" id="fileName" style="cursor:pointer;color:var(--cyan);text-decoration:underline" onclick="event.stopPropagation();event.preventDefault();downloadTemplate()">下载数据模板</span>
      </label>
      <input type="file" id="fileInput" accept=".xlsx,.xls">
    </div>

    <div class="settings-row">
      <label><b><span>电池</span><span>容量</span></b> <input type="number" id="batteryCap" value="80" step="5" min="20" max="200"> kWh</label>
      <label><b><span>慢充</span><span>阈值</span></b> <input type="number" id="slowThreshold" value="15" step="1" min="1" max="50"> kW</label>
      <label><b><span>充电</span><span>效率</span></b> <input type="number" id="efficiency" value="92" step="1" min="70" max="100"> %</label>
      <label><b><span>卡券</span><span>消费</span></b> <input type="number" id="ecardAmount" value="0" step="10" min="0" max="9999"> 元</label>
      <label><b><span>常驻</span><span>地</span></b> <input type="text" id="homeCity" value="北京" style="width:52px"> </label>
    </div>
  </div>

  <div class="hero-visual">
    <div class="stat-hero" id="heroStats">
      <div class="number">—</div>
      <div class="unit">上传后显示核心指标</div>
      <div class="meta-row">
        <div class="meta-item"><div class="val">—</div><div class="lbl">充电次数</div></div>
        <div class="meta-item"><div class="val">—</div><div class="lbl">快充</div></div>
        <div class="meta-item"><div class="val">—</div><div class="lbl">慢充</div></div>
        <div class="meta-item"><div class="val">—</div><div class="lbl">实付(元)</div></div>
      </div>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
        <div class="spinner"></div>
        <p id="loadingText">正在解析数据...</p>
    </div>
</div>

<!-- Report -->
<div class="report" id="report"></div>

function geoName(province, district) {
    const cities = __cityMap[province] || [];
    // 1. Direct substring match (大兴 → 大兴区)
    for (const c of cities) {
        if (c.includes(district)) return c;
    }
    // 2. Base name match (沧州 → 沧州市)
    for (const c of cities) {
        if (district === c.replace(/[市县区]$/, '')) return c;
    }
    // 3. Try append 市/县/区
    for (const s of ['市','县','区']) {
        if (cities.includes(district + s)) return district + s;
    }
    // 4. County fallback (张北 → 张家口市)
    const fb = __countyFallback[province];
    if (fb) {
        for (const s of ['','市','县','区']) {
            const key = district + s;
            if (fb[key]) return fb[key];
        }
    }
    return district;
}

const SLOW_THRESHOLD_DEFAULT = 15;
const EFFICIENCY_DEFAULT = 0.92;

// ====== Parse Excel ======
function parseExcel(data) {
    const wb = XLSX.read(data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });

    // Find header row
    let headerIdx = -1;
    for (let i = 0; i < Math.min(rows.length, 10); i++) {
        const row = rows[i];
        if (!row || !Array.isArray(row)) continue;
        const strRow = row.map(c => c !== undefined && c !== null ? String(c) : '');
        if (strRow.some(c => typeof c === 'string' && (c.includes('开始时间') || c.includes('用电量') || c.includes('充电站')))) {
            headerIdx = i;
            break;
        }
    }
    if (headerIdx === -1) {
        // Second attempt: search more rows
        for (let i = 0; i < Math.min(rows.length, 20); i++) {
            const row = rows[i];
            if (!row || !Array.isArray(row)) continue;
            const strRow = row.map(c => c !== undefined && c !== null ? String(c) : '');
            if (strRow.some(c => typeof c === 'string' && (c.includes('时间') || c.includes('电量')))) {
                headerIdx = i;
                break;
            }
        }
    }
    if (headerIdx === -1) throw new Error('未找到表头行，请确认包含: 开始时间、结束时间、用电量、充电站 等列');

    const rawHeaders = rows[headerIdx];
    const headers = [];
    for (let i = 0; i < rawHeaders.length; i++) {
        const h = rawHeaders[i];
        headers.push(h !== undefined && h !== null ? String(h).trim() : '');
    }

    const colMap = {};
    const keywords = {
        '开始时间': ['开始时间', '开始充电', 'start_time', '开始'],
        '结束时间': ['结束时间', '结束充电', 'end_time', '结束'],
        '用电量': ['用电量', '电量', '充电量', 'kwh', '度数'],
        '充电站': ['充电站', '充电站名', '站点', '站名', '地点'],
        '实付': ['实付', '实际支付', '支付金额', '实付金额'],
        '金额': ['金额', '充电金额', '总金额', '费用'],
        '省市': ['省市', '省份', '省', '城市'],
        '地区': ['地区', '区县', '区域', '区'],
        '来源': ['来源', '平台', '运营商', '涞源']
    };
    for (let i = 0; i < headers.length; i++) {
        const h = headers[i];
        if (!h) continue;
        for (const [key, names] of Object.entries(keywords)) {
            if (names.some(n => h.includes(n))) { colMap[key] = i; break; }
        }
    }

    // Fallback by position: if header names don't match, use known positions
    if (colMap['省市'] === undefined && headers.length > 8 && headers[8]) colMap['省市'] = 8;
    if (colMap['地区'] === undefined && headers.length > 9 && headers[9]) colMap['地区'] = 9;
    if (colMap['来源'] === undefined && headers.length > 10 && headers[10]) colMap['来源'] = 10;

    const foundHeaders = headers.filter(Boolean);
    if (colMap['开始时间'] === undefined) throw new Error('未找到"开始时间"列（解析到: ' + foundHeaders.join(', ') + '）');
    if (colMap['结束时间'] === undefined) throw new Error('未找到"结束时间"列');
    if (colMap['用电量'] === undefined) throw new Error('未找到"用电量"列');

    const records = [];
    for (let i = headerIdx + 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row || !Array.isArray(row) || row.length === 0) continue;
        const v = idx => idx < row.length ? row[idx] : undefined;
        const kWh = parseFloat(v(colMap['用电量']));
        if (isNaN(kWh) || kWh <= 0) continue;

        const parseDate = (val) => {
            if (typeof val === 'number') return new Date((val - 25569) * 86400000);
            const s = String(val || '').trim();
            if (!s) return new Date(NaN);
            return new Date(s);
        };
        const startTime = parseDate(v(colMap['开始时间']));
        const endTime = parseDate(v(colMap['结束时间']));
        if (isNaN(startTime) || isNaN(endTime)) continue;
        if (endTime <= startTime) continue;

        const amount = colMap['金额'] !== undefined ? parseFloat(v(colMap['金额'])) || 0 : 0;
        const paid = colMap['实付'] !== undefined ? parseFloat(v(colMap['实付'])) || 0 : 0;
        const station = colMap['充电站'] !== undefined ? String(v(colMap['充电站']) || '').trim() : '未知';
        const province = colMap['省市'] !== undefined ? String(v(colMap['省市']) || '').trim() : '';
        const district = colMap['地区'] !== undefined ? String(v(colMap['地区']) || '').trim() : '';
        const source = colMap['来源'] !== undefined ? String(v(colMap['来源']) || '').trim() : '';

        records.push({
            startTime, endTime,
            durationMin: (endTime - startTime) / 60000,
            chargedKWh: kWh,
            amount, paid,
            station: station || '未知',
            province, district, source,
            dateStr: startTime.getFullYear() + '-' + String(startTime.getMonth()+1).padStart(2,'0') + '-' + String(startTime.getDate()).padStart(2,'0'),
            month: startTime.getMonth() + 1
        });
    }
    if (records.length === 0) throw new Error('未解析到有效充电记录');
    return records;
}

// ====== Merge Jump-Gun Records ======
function mergeJumpGunRecords(records, gapMinutes) {
    gapMinutes = gapMinutes || 30;
    const sorted = [...records].sort((a, b) => {
        if (a.station !== b.station) return a.station.localeCompare(b.station);
        return a.startTime - b.startTime;
    });

    const merged = [];
    const groups = []; // for display
    let i = 0;
    while (i < sorted.length) {
        const group = [sorted[i]];
        let j = i + 1;
        while (j < sorted.length && sorted[j].station === group[0].station) {
            const prev = group[group.length - 1];
            const gap = (sorted[j].startTime - prev.endTime) / 60000;
            if (gap > gapMinutes) break;
            group.push(sorted[j]);
            j++;
        }

        if (group.length === 1) {
            merged.push(group[0]);
        } else {
            const sumDuration = group.reduce((s, r) => s + r.durationMin, 0);
            merged.push({
                startTime: group[0].startTime,
                endTime: group[group.length - 1].endTime,
                durationMin: sumDuration,
                chargedKWh: group.reduce((s, r) => s + r.chargedKWh, 0),
                amount: group.reduce((s, r) => s + r.amount, 0),
                paid: group.reduce((s, r) => s + r.paid, 0),
                station: group[0].station,
                province: group[0].province || '',
                district: group[0].district || '',
                source: group[0].source || '',
                dateStr: group[0].dateStr,
                month: group[0].month
            });
            groups.push({
                station: group[0].station,
                dateStr: group[0].dateStr,
                records: group.map(r => ({
                    startTime: r.startTime,
                    endTime: r.endTime,
                    chargedKWh: r.chargedKWh,
                    durationMin: r.durationMin
                })),
                totalKWh: group.reduce((s, r) => s + r.chargedKWh, 0),
                totalDurationMin: sumDuration
            });
        }
        i = j;
    }
    return { merged, groups };
}

// ====== Process Records ======
function processRecords(records, batteryKWh, efficiency, slowThresholdKw) {
    return records.map(r => {
        const startSOC = 100 - (r.chargedKWh * efficiency / batteryKWh * 100);
        const avgPower = r.chargedKWh / (r.durationMin / 60);
        return {
            ...r,
            startSOC: Math.max(0, Math.min(100, startSOC)),
            avgPower,
            isSlow: avgPower < slowThresholdKw
        };
    });
}

// ====== Render Report ======
async function handleFile(file) {
    setLoading(true, '正在读取文件...');
    try {
        const buf = await file.arrayBuffer();
        let rawRecords = parseExcel(buf);

        // Merge jump-gun records (same station, <30min gap)
        const beforeMerge = rawRecords.length;
        const { merged: mergedRecords, groups: jumpGunGroups } = mergeJumpGunRecords(rawRecords);
        rawRecords = mergedRecords;
        window.__rawRecords = rawRecords;
        const mergedCnt = beforeMerge - rawRecords.length;
        window.__mergedCnt = mergedCnt;
        window.__jumpGunGroups = jumpGunGroups;

        // Debug: verify amounts survived merge
        const totalAmt = rawRecords.reduce((s, r) => s + (r.amount || 0), 0);
        const totalPd = rawRecords.reduce((s, r) => s + (r.paid || 0), 0);
        console.log('After merge: records=' + rawRecords.length + ' amount=' + totalAmt + ' paid=' + totalPd);

        const homeCity = ($('homeCity').value || '').trim() || '北京';
        window.__homeCity = homeCity;
        const batteryKWh = parseFloat($('batteryCap').value) || BATTERY_DEFAULT;
        const slowKw = parseFloat($('slowThreshold').value) || SLOW_THRESHOLD_DEFAULT;
        const eff = (parseFloat($('efficiency').value) || 92) / 100;

        // Date range
        const dates = rawRecords.map(r => r.dateStr).sort();
        const minDate = dates[0], maxDate = dates[dates.length - 1];

        setLoading(true, '正在分析数据...');
        await new Promise(r => setTimeout(r, 50));

        const allRecords = processRecords(rawRecords, batteryKWh, eff, slowKw);
        const fastRecords = allRecords.filter(r => !r.isSlow);

        // Store globally for detail popup
        window.__fastRecords = fastRecords;
        window.__allRecords = allRecords;
        window.__fullRecords = [...allRecords]; // keep full data for year-over-year chart
        window.__batteryKWh = batteryKWh;
        window.__eff = eff;
        const slowRecords = allRecords.filter(r => r.isSlow);

        // Compute stats
        const totalKWh = allRecords.reduce((s, r) => s + r.chargedKWh, 0);
        const totalAmount = allRecords.reduce((s, r) => s + r.amount, 0);
        const totalPaid = allRecords.reduce((s, r) => s + r.paid, 0);

        const reportCtx = {
            allRecords, fastRecords, slowRecords,
            totalKWh, totalAmount, totalPaid,
            batteryKWh, minDate, maxDate, slowKw, eff, homeCity
        };
        window.__reportCtx = reportCtx;
        window.__activeCtx = reportCtx;
        renderReport(reportCtx);

    } catch (e) {
        setLoading(false);
        $('report').classList.remove('visible');
        $('report').innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
        $('report').classList.add('visible');
    }
    // Reset file input so re-selecting same file triggers change
    $('fileInput').value = '';
    setLoading(false);
}

            const fallback = document.createElement('div');
            fallback.style.cssText = 'background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);flex:1';
            let ph = '<div style="font-size:13px"><strong style="font-size:14px">省市</strong><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:8px">';
            for (const [p, d] of Object.entries(provMap).sort((a,b)=>b[1].cnt-a[1].cnt)) {
                ph += `<div style="background:#f8fafc;border-radius:8px;padding:10px"><div style="font-weight:600">${p}</div><div style="font-size:12px;color:#64748b">${d.cnt}次·${d.kwh.toFixed(0)}kWh</div></div>`;
            }
            fallback.innerHTML = ph + '</div></div>';
            mapSrcRow.appendChild(fallback);
        }

        $('report').appendChild(mapSrcRow);

        // Render map if ECharts available
        if (typeof echarts !== 'undefined') {
            const distMap = {};
            const nameToKey = {}; // normalized name → "province|district"
            allRecords.forEach(r => {
                const key = (r.province || '') + '|' + (r.district || '');
                if (!key.includes('|') || r.district === '') return;
                if (!distMap[key]) distMap[key] = { province: r.province, district: r.district, cnt: 0, kwh: 0 };
                distMap[key].cnt++;
                distMap[key].kwh += r.chargedKWh;
            });
            // Build name mapping
            for (const [key] of Object.entries(distMap)) {
                const [prov, dist] = key.split('|');
                const nn = geoName(prov, dist);
                nameToKey[nn] = key;
            }
            window.__nameToKey = nameToKey;
            requestAnimationFrame(() => renderChinaMap(provMap, distMap));
        }
    }

    // ====== 2. Trip Analysis ======
    if (allRecords.length > 0) {
        // Use ALL records (including slow) for trip boundary detection
        const allSorted = [...allRecords].filter(r => r.province).sort((a, b) => a.startTime - b.startTime);

        // Detect trips: consecutive non-Beijing records.
        // If a Beijing charge happened within 36h before the first waypoint charge,
        // treat it as pre-trip top-up and include it in the trip's departure.
        const trips = [];
        let curTrip = null;
        let lastBjRecord = null;
        for (const r of allSorted) {
            const isBj = isHomeCity(r, homeCity);
            if (!isBj) {
                if (!curTrip) {
                    curTrip = {startTime: r.startTime, endTime: r.startTime, provinces: [], districts: [], records: [], totalKwh: 0};
                    // Include Beijing pre-charge on same day or previous day
                    const dayGap = lastBjRecord ? Math.round((new Date(r.startTime.getFullYear(), r.startTime.getMonth(), r.startTime.getDate()) - new Date(lastBjRecord.endTime.getFullYear(), lastBjRecord.endTime.getMonth(), lastBjRecord.endTime.getDate())) / 86400000) : 99;
                    if (lastBjRecord && dayGap >= 0 && dayGap <= 1) {
                        curTrip.startTime = lastBjRecord.endTime;
                        curTrip.records.push(lastBjRecord);
                        curTrip.totalKwh += lastBjRecord.chargedKWh;
                        curTrip.preChargeKwh = (curTrip.preChargeKwh || 0) + lastBjRecord.chargedKWh;
                    }
                }
                curTrip.endTime = r.endTime;
                if (!curTrip.provinces.includes(r.province)) curTrip.provinces.push(r.province);
                const dist = r.district || '';
                if (dist) curTrip.districts.push(dist);
                curTrip.records.push(r);
                curTrip.totalKwh += r.chargedKWh;
            } else {
                if (curTrip) {
                    curTrip.days = calcDays(curTrip.startTime, curTrip.endTime);
                    if (curTrip.records.length > 0) trips.push(curTrip);
                    curTrip = null;
                }
                lastBjRecord = r;
            }
        }
        if (curTrip && curTrip.records.length > 0) { curTrip.days = calcDays(curTrip.startTime, curTrip.endTime); trips.push(curTrip); }
        window.__trips = trips;

        if (trips.length > 0) {
            const tripContainer = document.createElement('div');
            tripContainer.id = 'tripSection';

            const tripTitle = document.createElement('div');
            tripTitle.className = 'section-title';
            tripTitle.innerHTML = `行程分析 <span class="badge">${trips.length} 次出行</span>`;
            tripContainer.appendChild(tripTitle);

            const totalTripKwh = trips.reduce((s, t) => s + t.totalKwh - (t.preChargeKwh || 0), 0);
            const totalLocalKwh = allRecords.filter(r => isHomeCity(r, homeCity)).reduce((s, r) => s + r.chargedKWh, 0);
            const allDests = [...new Set(trips.flatMap(t => t.districts.filter(Boolean)))];

            const summaryDiv = document.createElement('div');
            summaryDiv.className = 'stats-grid';
            summaryDiv.innerHTML = `
                <div class="stat-card"><div class="label">出行次数</div><div class="value cyan">${trips.length}</div><div class="sub">${allDests.length ? '去过 ' + allDests.join('·') : ''}</div></div>
                <div class="stat-card"><div class="label">出行充电</div><div class="value">${totalTripKwh.toFixed(0)}</div><div class="sub">kWh</div></div>
                <div class="stat-card"><div class="label">本地充电</div><div class="value">${totalLocalKwh.toFixed(0)}</div><div class="sub">kWh</div></div>
                <div class="stat-card"><div class="label">出行占比</div><div class="value green">${(totalTripKwh / (totalTripKwh + totalLocalKwh) * 100).toFixed(0)}%</div><div class="sub">充电量</div></div>
            `;
            tripContainer.appendChild(summaryDiv);

            const tripDiv = document.createElement('div');
            tripDiv.className = 'table-wrap';
            let tripHtml = '<table><thead><tr><th style="text-align:left;white-space:nowrap">出发</th><th style="text-align:left;white-space:nowrap">返回</th><th style="text-align:right;width:40px;white-space:nowrap">天数</th><th style="text-align:left">途经</th><th style="text-align:right;width:50px;white-space:nowrap">次数</th><th style="text-align:right;width:50px;white-space:nowrap">电量</th></tr></thead><tbody>';
            trips.forEach(t => {
                const sd = new Date(t.startTime), ed = new Date(t.endTime);
                const dests = t.districts.filter((d, i, a) => i === 0 || d !== a[i-1]).join(' → ');
                const h = tripHasHoliday(t);
                tripHtml += `<tr style="cursor:pointer" onclick="showTripDetail(${trips.indexOf(t)})">
                    <td style="text-align:left;font-size:12px">${fmtDate(sd)}</td>
                    <td style="text-align:left;font-size:12px">${fmtDate(ed)}</td>
                    <td style="text-align:right">${t.days}</td>
                    <td style="text-align:left;font-size:12px">${dests}${h ? ` <span style="display:inline-block;background:var(--cyan-light);color:var(--cyan-dim);font-size:10px;padding:1px 6px;border-radius:4px;margin-left:4px">${h}</span>` : ''}</td>
                    <td style="text-align:right">${t.records.length}</td>
                    <td style="text-align:right">${t.totalKwh.toFixed(0)}</td>
                </tr>`;
            });
            tripHtml += '</tbody></table></div>';
            tripDiv.innerHTML = tripHtml;
            tripContainer.appendChild(tripDiv);

            const chartBox = document.createElement('div');
            chartBox.className = 'chart-box';
            chartBox.innerHTML = '<canvas id="chartTripMonthly" style="max-height:250px"></canvas>';
            tripContainer.appendChild(chartBox);

            // Year-over-year chart (only when no year filter)
            if (!ctx._currentYear) {
                const chartBoxYear = document.createElement('div');
                chartBoxYear.className = 'chart-box';
                chartBoxYear.style.marginTop = '16px';
                chartBoxYear.innerHTML = '<canvas id="chartTripYearly" style="max-height:250px"></canvas>';
                tripContainer.appendChild(chartBoxYear);
                $('report').appendChild(tripContainer);
                requestAnimationFrame(() => {
                    renderTripChart(allRecords, trips, homeCity);
                    renderTripYearChart(homeCity);
                });
            } else {
                $('report').appendChild(tripContainer);
                requestAnimationFrame(() => renderTripChart(allRecords, trips, homeCity));
            }
        }
    }

    // ====== 3. SOC vs Charging Time Scatter + Distribution ======
    if (fastRecords.length >= 6) {
        const chartSection = document.createElement('div');
        chartSection.className = 'section-title';
        chartSection.innerHTML = `SOC × 充电时长 <span class="badge">${homeCity}全部快充记录</span>`;
        $('report').appendChild(chartSection);

        const flexRow = document.createElement('div');
        flexRow.style.cssText = 'display:flex;gap:20px';
        flexRow.innerHTML = `
          <div class="chart-box" style="flex:1.3;aspect-ratio:1;padding:16px"><canvas id="chartScatterAll" style="width:100%;height:100%"></canvas></div>
          <div class="chart-box" style="flex:1;aspect-ratio:1;padding:16px"><canvas id="chartSocDist" style="width:100%;height:100%"></canvas></div>`;
        $('report').appendChild(flexRow);

        requestAnimationFrame(() => {
            renderSOCScatter(fastRecords, homeCity);
        });
    } else {
        const noData = document.createElement('div');
        noData.className = 'no-data';
        noData.innerHTML = '<strong>数据不足</strong>，需要至少 6 条快充记录展示 SOC × 充电时长的关系';
        $('report').appendChild(noData);
    }

    // ====== 5. Station Overview ======
    if (fastRecords.length > 0) {
        const stationSection = document.createElement('div');
        stationSection.className = 'section-title';
        stationSection.innerHTML = `常用充电站`;
        $('report').appendChild(stationSection);

        const stationCnt = {};
        allRecords.forEach(r => {
            if (!stationCnt[r.station]) stationCnt[r.station] = { cnt: 0, powers: [], totalKwh: 0 };
            stationCnt[r.station].cnt++;
            stationCnt[r.station].powers.push(r.avgPower);
            stationCnt[r.station].totalKwh += r.chargedKWh;
        });

        const sorted = Object.entries(stationCnt).sort((a, b) => b[1].cnt - a[1].cnt).slice(0, 10);
        const maxCnt = sorted.length > 0 ? sorted[0][1].cnt : 1;

        const grid = document.createElement('div');
        grid.className = 'station-grid';
        sorted.forEach(([name, data], idx) => {
            const avgP = data.powers.reduce((a, b) => a + b, 0) / data.powers.length;
            const maxP = Math.max(...data.powers);
            const pct = Math.round(data.cnt / maxCnt * 100);
            const item = document.createElement('div');
            item.className = 'station-item';
            item.innerHTML = `
                <span style="font-family:var(--display);font-size:13px;font-weight:600;color:var(--text-faint);width:28px;flex-shrink:0">${String(idx + 1).padStart(2, '0')}</span>
                <div style="flex:1;min-width:0">
                    <div class="name" title="${name}">${name}</div>
                    <div class="meta">${data.cnt}次 · ${data.totalKwh.toFixed(0)} kWh</div>
                </div>
                <div style="width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;flex-shrink:0">
                    <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--cyan),rgba(0,179,131,0.6));border-radius:3px"></div>
                </div>
                <div style="text-align:right;flex-shrink:0;min-width:56px">
                    <div style="font-family:var(--mono);font-size:15px;font-weight:600;color:var(--cyan)">${avgP.toFixed(0)}</div>
                    <div style="font-size:10px;color:var(--text-faint);line-height:1">kW</div>
                </div>
            `;
            grid.appendChild(item);
        });
        $('report').appendChild(grid);
    }


    // ====== 6. Slow Charge Analysis ======
    if (slowRecords.length > 0) {
        const slowSection = document.createElement('div');
        slowSection.className = 'section-title';
        slowSection.innerHTML = `慢充校准记录 <span class="badge">${slowRecords.length} 次，间隔分析</span>`;
        $('report').appendChild(slowSection);

        const slowSorted = [...slowRecords].sort((a, b) => a.startTime - b.startTime);
        const lastSlow = slowSorted[slowSorted.length - 1];
        const daysSinceLastSlow = Math.round((Date.now() - lastSlow.startTime) / 86400000);

        // Alert: days since last slow charge
        const slowAlert = document.createElement('div');
        slowAlert.className = `alert ${daysSinceLastSlow > 60 ? 'warn' : 'info'}`;
        const lastSlowDate = new Date(lastSlow.startTime);
        slowAlert.innerHTML = `上次慢充校准：<strong>${fmtDate(lastSlowDate)}</strong>，距今 <strong>${daysSinceLastSlow} 天</strong>${daysSinceLastSlow > 60 ? ' ⚠️ 已超过2个月，建议尽快做一次慢充校准' : daysSinceLastSlow > 30 ? ' ⚠️ 已超过1个月，可以考虑做一次慢充校准' : ''}`;
        $('report').appendChild(slowAlert);

        const slowDiv = document.createElement('div');
        slowDiv.className = 'table-wrap';

        let slowHtml = '<table><thead><tr><th style="text-align:left">日期</th><th style="text-align:left">充电站</th><th style="text-align:right">距上次(天)</th><th style="text-align:right">充电量</th><th style="text-align:right">起始SOC</th><th style="text-align:right">时长</th><th style="text-align:right">平均功率</th></tr></thead><tbody>';
        let lastDate = null;
        slowSorted.forEach(r => {
            const interval = lastDate ? Math.round((r.startTime - lastDate) / 86400000) : '-';
            lastDate = r.startTime;
            const d = new Date(r.startTime);
            const dy = fmtDate(d);
            slowHtml += `<tr>
                <td style="text-align:left">${dy}</td><td style="font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left" title="${r.station}">${r.station}</td>
                <td style="text-align:right">${interval}</td><td style="text-align:right">${r.chargedKWh.toFixed(1)}</td><td style="text-align:right">${r.startSOC.toFixed(0)}%</td>
                <td style="text-align:right">${r.durationMin.toFixed(0)}</td><td style="text-align:right">${r.avgPower.toFixed(1)}</td>
            </tr>`;
        });
        slowHtml += '</tbody></table>';
        slowHtml += `<div class="note">慢充（功率 < ${slowKw}kW）用于电池校准。建议每 1-2 个月做一次慢充以均衡电芯。</div>`;
        slowDiv.innerHTML = slowHtml;
        $('report').appendChild(slowDiv);
    }

    // ====== 7. Jump-Gun Records ======
    let jumpGunGroups = window.__jumpGunGroups;
    if (jumpGunGroups && ctx._currentYear) {
        jumpGunGroups = jumpGunGroups.filter(g => g.dateStr.startsWith(ctx._currentYear));
    }
    if (jumpGunGroups && jumpGunGroups.length > 0) {
        const jgSection = document.createElement('div');
        jgSection.className = 'section-title';
        jgSection.innerHTML = `跳枪续充记录 <span class="badge">${jumpGunGroups.length} 组</span>`;
        $('report').appendChild(jgSection);

        const jgDiv = document.createElement('div');
        jgDiv.className = 'table-wrap';
        let jgHtml = '<table><thead><tr><th style="text-align:left">日期</th><th style="text-align:left">充电站</th><th style="text-align:center">续充段数</th><th style="text-align:left">各段充电量</th><th style="text-align:right">总电量(kWh)</th><th style="text-align:right">总时长(min)</th></tr></thead><tbody>';

        jumpGunGroups.sort((a, b) => a.dateStr.localeCompare(b.dateStr)).forEach((g, idx) => {
            const d = new Date(g.dateStr);
            const ds = fmtDate(d);
            const segments = g.records.map(r => `${r.chargedKWh.toFixed(1)}`).join(' + ');
            jgHtml += `<tr style="cursor:pointer" onclick="showJumpGunDetail(${idx})">
                <td style="text-align:left">${ds}</td>
                <td style="font-size:12px;max-width:160px;text-align:left" title="${g.station}">${g.station}</td>
                <td style="text-align:center">${g.records.length}段</td>
                <td style="font-size:12px;text-align:left">${segments}</td>
                <td style="text-align:right">${g.totalKWh.toFixed(1)}</td>
                <td style="text-align:right">${g.totalDurationMin.toFixed(0)}</td>
            </tr>`;
        });
        jgHtml += '</tbody></table>';
        jgHtml += `<div class="note">跳枪续充：同一充电站短时间间隔内连续充电记录，已自动合并为单次完整充电参与分析。</div>`;
        jgDiv.innerHTML = jgHtml;
        $('report').appendChild(jgDiv);
    }

    // Update hero right-side stats
    updateHeroStats(ctx);

    $('report').classList.add('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function applyYearFilter() {
    const year = $('yearFilter').value;
    const ctx = window.__reportCtx;
    if (!ctx) return;
    const filterFn = r => !year || new Date(r.startTime).getFullYear() === parseInt(year);
    const allYears = [...new Set(ctx.allRecords.map(r => new Date(r.startTime).getFullYear()))].sort();
    // Re-render report with filtered data
    const filteredRecords = ctx.allRecords.filter(filterFn);
    const filteredDates = filteredRecords.map(r => r.dateStr).sort();
    const filteredCtx = {
        allRecords: filteredRecords,
        fastRecords: ctx.allRecords.filter(r => !r.isSlow).filter(filterFn),
        slowRecords: ctx.allRecords.filter(r => r.isSlow).filter(filterFn),
        totalKWh: filteredRecords.reduce((s,r) => s+r.chargedKWh, 0),
        totalAmount: filteredRecords.reduce((s,r) => s+r.amount, 0),
        totalPaid: filteredRecords.reduce((s,r) => s+r.paid, 0),
        batteryKWh: ctx.batteryKWh,
        minDate: filteredDates[0] || ctx.minDate,
        maxDate: filteredDates[filteredDates.length - 1] || ctx.maxDate,
        slowKw: ctx.slowKw,
        eff: ctx.eff,
        homeCity: ctx.homeCity,
        _allYears: allYears,
        _currentYear: year
    };
    window.__activeCtx = filteredCtx;
    // Clear report and re-render
    $('report').innerHTML = '';
    renderReport(filteredCtx);
}
// ====== Charts ======
function destroyChart(id) {
    if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

function renderSOCScatter(records, homeCity) {
    destroyChart('chartScatterAll');
    const scatterCtx = document.getElementById('chartScatterAll');
    if (!scatterCtx) return;

    // 单色：统一 cyan，不区分月份
    const bjRecords = records.filter(r => isHomeCity(r, homeCity) && r.startSOC < 90);
    window.__scatterRecords = bjRecords;
    const scatterData = [{
        label: '充电记录',
        data: bjRecords.map(r => ({ x: r.startSOC, y: r.durationMin })),
        backgroundColor: '#009ef7',
        pointRadius: 3.5,
        pointHoverRadius: 6
    }];

    Chart.register({
        id: 'bleedGrid',
        afterDraw(chart) {
            if (!chart.options.plugins?.bleedGrid?.enabled) return;
            const c = chart.ctx, xa = chart.scales.x, ya = chart.scales.y;
            const ext = 14;
            c.save();
            c.strokeStyle = 'rgba(0,0,0,0.035)'; c.lineWidth = 1;
            // Horizontal: extend past both sides
            [...ya.ticks].forEach(t => {
                if (t.value === undefined) return;
                const py = ya.getPixelForValue(t.value);
                c.beginPath(); c.moveTo(xa.left - ext, py); c.lineTo(xa.right + ext, py); c.stroke();
            });
            // Vertical: extend past both sides
            [...xa.ticks].forEach(t => {
                if (t.value === undefined) return;
                const px = xa.getPixelForValue(t.value);
                c.beginPath(); c.moveTo(px, ya.bottom + ext); c.lineTo(px, ya.top - ext); c.stroke();
            });
            c.restore();
        }
    });

    chartInstances['chartScatterAll'] = new Chart(scatterCtx, {
        type: 'scatter',
        data: { datasets: scatterData },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
                x: {
                    type: 'linear',
                    title: { display: true, text: '起始 SOC (%)', font: { size: 11 }, color: '#9ca3af' },
                    border: { color: 'rgba(0,0,0,0.035)' },
                    grid: { display: false },
                    ticks: { font: { size: 10 }, color: '#9ca3af', padding: 16 }
                },
                y: {
                    type: 'linear',
                    title: { display: true, text: '充电时长 (min)', font: { size: 11 }, color: '#9ca3af' },
                    border: { color: 'rgba(0,0,0,0.035)' },
                    grid: { display: false },
                    ticks: { font: { size: 10 }, color: '#9ca3af', padding: 16 }
                }
            },
            plugins: {
                bleedGrid: { enabled: true },
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(255,255,255,0.9)',
                    titleColor: '#0d111c', bodyColor: '#5a6577',
                    borderColor: '#e6e9f0', borderWidth: 1, padding: 10,
                    callbacks: { label: c => { const r = window.__scatterRecords[c.dataIndex]; return r ? fmtDate(new Date(r.startTime)) + ' · ' + r.chargedKWh.toFixed(1) + 'kWh · SOC ' + Math.round(c.parsed.x) + '% → ' + Math.round(c.parsed.y) + 'min' : 'SOC ' + Math.round(c.parsed.x) + '% → ' + Math.round(c.parsed.y) + 'min'; } }
                }
            }
        }
    });

    // SOC Distribution Histogram
    destroyChart('chartSocDist');
    const distCtx = document.getElementById('chartSocDist');
    if (!distCtx) return;

    const bins = [10, 20, 30, 40, 50, 60, 70, 80];
    const binLabels = bins.map(b => b + '%');
    const counts = bins.map(b => bjRecords.filter(r => r.startSOC >= b && r.startSOC < b + 10).length);

    chartInstances['chartSocDist'] = new Chart(distCtx, {
        type: 'bar',
        data: {
            labels: binLabels,
            datasets: [{
                data: counts,
                backgroundColor: '#009ef7',
                borderRadius: 3,
                barPercentage: 0.65
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            indexAxis: 'y',
            scales: {
                x: {
                    beginAtZero: true,
                    title: { display: true, text: '次数', font: { size: 10 }, color: '#9ca3af' },
                    grid: { display: false },
                    ticks: { stepSize: 5, font: { size: 9 }, color: '#9ca3af' }
                },
                y: {
                    title: { display: true, text: '起始 SOC（%）', font: { size: 10 }, color: '#9ca3af' },
                    grid: { display: false },
                    ticks: { font: { size: 9 }, color: '#5a6577' }
                }
            },
            plugins: {
                legend: { display: false },
                tooltip: { callbacks: { label: c => `${c.label} 区间: ${c.parsed.x} 次` } }
            }
        }
    });
}

function renderChinaMap(provMap, distMap) {
    const el = document.getElementById('chinaMap');
    if (!el) return;
    try {
        const myChart = echarts.init(el);

        // Determine which provinces to load (all visited)
        const visitedProvs = [...new Set(Object.values(distMap).map(d => d.province))].filter(p => __provAdcode[p]);

        // Aggregate by normalized city name
        const cityData = {};
        for (const [key, d] of Object.entries(distMap)) {
            const [prov, dist] = key.split('|');
            const name = geoName(prov, dist);
            if (!cityData[name]) cityData[name] = {cnt:0,kwh:0};
            cityData[name].cnt += d.cnt;
            cityData[name].kwh += d.kwh;
        }

        const provs = [...new Set(Object.values(distMap).map(d => d.province))].filter(p => __provAdcode[p]);
        const isFileProto = window.location.protocol === 'file:';
        const geojsonUrl = isFileProto ? 'https://geo.datav.aliyun.com/areas_v3/bound/' : './geojson/';

        Promise.all([
            fetch(geojsonUrl+'100000_full.json').then(r=>r.json())
        ].concat(provs.map(p =>
            fetch(geojsonUrl+__provAdcode[p]+'_full.json').then(r=>r.json())
        ))).then(results => {
            const provFeatures = results[0].features;
            const cityFeaturesAll = results.slice(1);

            // Build set of province-level adcodes to exclude
            const provNameToAdcode = {};
            for (const f of provFeatures) {
                const nm = f.properties.name;
                for (const p of provs) {
                    if (nm.includes(p)) { provNameToAdcode[p] = parseInt(f.properties.adcode); break; }
                }
            }
            const excludeAdcodes = new Set(Object.values(provNameToAdcode));

            // Merged: province features for others + city features for visited
            const merged = {type:'FeatureCollection', features:[]};
            for (const f of provFeatures) {
                if (!excludeAdcodes.has(parseInt(f.properties.adcode))) {
                    merged.features.push(f);
                }
            }
            for (const fc of cityFeaturesAll) {
                for (const f of fc.features) merged.features.push(f);
            }

            echarts.registerMap('chinaMerged', merged);
            const maxCnt = Math.max(...Object.values(cityData).map(d=>d.cnt), 1);
            const mapData = Object.entries(cityData).map(([n,d])=>({name:n,value:d.cnt,kwh:d.kwh.toFixed(0)}));

            myChart.setOption({
                tooltip: {
                    trigger: 'item',
                    formatter: p => {
                        if (p.data && p.data.value > 0) {
                            return `<strong>${p.name}</strong><br/>充电次数: ${p.value} 次<br/>电量: ${p.data.kwh} kWh<br/><span style="color:#94a3b8;font-size:12px">点击查看详情</span>`;
                        }
                        return p.name;
                    }
                },
                visualMap: {
                    min:0, max:maxCnt, left:'left', bottom:10,
                    text:['多','少'], textStyle:{color:'#64748b',fontSize:11},
                    inRange:{color:['#2c7bb6','#abd9e9','#ffffbf','#fdae61','#f46d43','#d73027']}, calculable:false
                },
                series: [{
                    type:'map', map:'chinaMerged', roam:true, selectedMode:false,
                    label: { show: false },
                    data: mapData,
                    itemStyle: { borderColor:'#cbd5e1', borderWidth:0.5, areaColor:'#f1f5f9' },
                    emphasis: {
                        label: { show: true, fontSize: 12, fontWeight: 'bold' },
                        itemStyle: { areaColor: '#fbb03b' }
                    }
                }]
            });

            // Click handler: show city charging details
            myChart.on('click', params => {
                const name = params.name;
                if (!name || !window.__nameToKey) { resetMapPanel(); return; }
                const key = window.__nameToKey[name];
                if (!key) { resetMapPanel(); return; }
                const [province, district] = key.split('|');
                showCityDetail(province, district);
            });
        }).catch(() => {
            el.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:80px 0;font-size:14px">地图数据加载失败</div>';
        });
    } catch (e) {
        el.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:80px 0;font-size:14px">地图组件不可用</div>';
    }
}


function renderTripChart(allRecords, trips, homeCity) {
    destroyChart('chartTripMonthly');
    const ctx = document.getElementById('chartTripMonthly');
    if (!ctx) return;

    const local = allRecords.filter(r => isHomeCity(r, homeCity));
    const tripRecords = new Set();
    trips.forEach(t => t.records.forEach(r => tripRecords.add(r)));

    const localMonthly = {}, tripMonthly = {};
    for (let m = 1; m <= 12; m++) { localMonthly[m] = 0; tripMonthly[m] = 0; }

    local.forEach(r => { localMonthly[r.month] = (localMonthly[r.month] || 0) + r.chargedKWh; });
    trips.forEach(t => t.records.forEach(r => { if (!isHomeCity(r, homeCity)) tripMonthly[r.month] = (tripMonthly[r.month] || 0) + r.chargedKWh; }));

    const labels = [], localData = [], tripData = [];
    for (let m = 1; m <= 12; m++) {
        labels.push(m + '月');
        localData.push(Math.round(localMonthly[m] || 0));
        tripData.push(Math.round(tripMonthly[m] || 0));
    }

    chartInstances['chartTripMonthly'] = new Chart(ctx, {
        type: 'bar',
        data: {
            labels,
            datasets: [
                { label: '本地', data: localData, backgroundColor: '#009ef7', borderRadius: 4 },
                { label: '出行', data: tripData, backgroundColor: '#f15b5b', borderRadius: 4 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: true,
            scales: {
                x: { stacked: true, grid: { display: false } },
                y: { stacked: true, title: { display: true, text: 'kWh' }, grid: { color: 'rgba(0,0,0,0.06)', drawTicks: false }, beginAtZero: true }
            },
            plugins: {
                legend: { position: 'top', labels: { boxWidth: 14, font: { size: 12 } } },
                tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y} kWh` } }

        }
    });
}

function renderTripYearChart(homeCity) {
    destroyChart('chartTripYearly');
    const ctx = document.getElementById('chartTripYearly');
    if (!ctx) return;
    const all = window.__fullRecords || [];
    if (all.length === 0) return;

    // Group by year
    const years = [...new Set(all.map(r => new Date(r.startTime).getFullYear()))].sort();
    const localByYear = {}, tripByYear = {};
    years.forEach(y => { localByYear[y] = 0; tripByYear[y] = 0; });

    all.forEach(r => {
        const y = new Date(r.startTime).getFullYear();
        const isLocal = isHomeCity(r, homeCity);
        if (isLocal) localByYear[y] += r.chargedKWh;
        else tripByYear[y] += r.chargedKWh;
    });

    chartInstances['chartTripYearly'] = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: years.map(y => y + '年'),
            datasets: [
                { label: '本地', data: years.map(y => Math.round(localByYear[y])), backgroundColor: '#009ef7', borderRadius: 4 },
                { label: '出行', data: years.map(y => Math.round(tripByYear[y])), backgroundColor: '#f15b5b', borderRadius: 4 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: true,
            scales: {
                x: { stacked: true, grid: { display: false } },
                y: { stacked: true, title: { display: true, text: 'kWh' }, grid: { color: 'rgba(0,0,0,0.06)', drawTicks: false }, beginAtZero: true }
            },
            plugins: {
                legend: { position: 'top', labels: { boxWidth: 14, font: { size: 12 } } },

}

function showDetail(soc, month, minutes, monthCount, batteryKWh, effPct) {
    const modal = $('detailModal');
    const overlay = $('modalOverlay');
    if (!modal || !overlay) return;

    // Get Beijing records for this month with close SOC
    const records = window.__fastRecords || [];
    const monthRecords = records.filter(r => r.month === month && isHomeCity(r, window.__homeCity || '北京') && !r.isSlow);

    // Sort by how close their start SOC is to the clicked SOC
    const socRecords = monthRecords
        .map(r => ({ ...r, socDiff: Math.abs(r.startSOC - soc) }))
        .sort((a, b) => a.socDiff - b.socDiff)
        .slice(0, 10);

    const kwh = (100 - soc) / 100 * batteryKWh / (effPct / 100);
    const seasonMap = { 3:'春',4:'春',5:'春',6:'夏',7:'夏',8:'夏',9:'秋',10:'秋',11:'秋',12:'冬',1:'冬',2:'冬' };

    let rowsHtml = '';
    if (socRecords.length > 0) {
        socRecords.forEach(r => {
            const d = new Date(r.startTime);
            const ds2 = fmtDate(d);
            rowsHtml += `<tr>
                <td style="text-align:left">${ds2}</td>
                <td style="font-size:12px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left" title="${r.station}">${r.station}</td>
                <td style="text-align:right">${r.chargedKWh.toFixed(1)}</td>
                <td style="text-align:right">${r.startSOC.toFixed(0)}</td>
                <td style="text-align:right">${r.durationMin.toFixed(0)}</td>
                <td style="text-align:right">${r.avgPower.toFixed(0)}</td>
            </tr>`;
        });
    }

    const season = seasonMap[month] || '';
    modal.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
            <div>
                <span style="font-size:13px;color:var(--text-dim)">${season}季 · ${month}月</span>
                <h3 style="font-size:20px;font-weight:700;margin:2px 0 0;color:var(--text)">${soc}% → 100%</h3>
            </div>
            <div style="text-align:right">
                <div style="font-size:28px;font-weight:800;color:var(--cyan)">${minutes}<span style="font-size:14px;font-weight:400;color:var(--text-dim)"> min</span></div>
                <div style="font-size:12px;color:var(--text-faint)">${kwh.toFixed(0)} kWh</div>
            </div>
        </div>`;

    if (socRecords.length > 0) {
        const nearestDiff = socRecords[0].socDiff;
        modal.innerHTML += `
        <div style="font-size:13px;color:var(--text-dim);margin-bottom:10px">
            该月共 ${monthRecords.length} 次快充记录${nearestDiff > 3 ? `，最近起始SOC偏差约 ${nearestDiff.toFixed(0)}%` : ''}：
        </div>
        <div style="overflow-x:auto;font-size:13px">
        <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--subtle)">
            <th style="padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)">日期</th>
            <th style="padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)">充电站</th>
            <th style="padding:6px 8px;text-align:right;border-bottom:1px solid var(--border)">电量</th>
            <th style="padding:6px 8px;text-align:right;border-bottom:1px solid var(--border)">起始SOC</th>
            <th style="padding:6px 8px;text-align:right;border-bottom:1px solid var(--border)">时长</th>
            <th style="padding:6px 8px;text-align:right;border-bottom:1px solid var(--border)">功率</th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
        </table></div>`;
    } else {
        modal.innerHTML += `<div style="color:var(--text-faint);font-size:13px;padding:20px 0;text-align:center">该月无实际快充记录</div>`;
    }

    modal.innerHTML += `

function resetMapPanel() {
    const panel = document.getElementById('mapDetailPanel');
    if (!panel) return;
    const records = window.__allRecords || window.__fastRecords || [];
    const distOverview = {};
    records.forEach(r => {
        const p = r.province || '', d = r.district || '';
        if (!d) return;
        const key = p + '|' + d;
        if (!distOverview[key]) distOverview[key] = {province:p, district:d, cnt:0, kwh:0};
        distOverview[key].cnt++;
        distOverview[key].kwh += r.chargedKWh;
    });
    const distHtml = Object.entries(distOverview).sort((a,b) => b[1].cnt - a[1].cnt).map(([key, d]) => {
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-radius:6px;background:var(--subtle);margin-bottom:4px;font-size:13px;cursor:pointer" onclick="showCityDetail('${d.province}','${d.district}')">

// ====== 效率/电池/慢充阈值变更实时重渲染 ======
let __reprocessTimer = null;
function reprocessAndRerender() {
    clearTimeout(__reprocessTimer);
    __reprocessTimer = setTimeout(() => {
        const rawRecords = window.__rawRecords;
        if (!rawRecords) return;
        const homeCity = ($('homeCity').value || '').trim() || '北京';
        const batteryKWh = parseFloat($('batteryCap').value) || BATTERY_DEFAULT;
        const slowKw = parseFloat($('slowThreshold').value) || SLOW_THRESHOLD_DEFAULT;
        const eff = (parseFloat($('efficiency').value) || 92) / 100;
        const allRecords = processRecords(rawRecords, batteryKWh, eff, slowKw);
        const fastRecords = allRecords.filter(r => !r.isSlow);
        const slowRecords = allRecords.filter(r => r.isSlow);
        window.__fastRecords = fastRecords;
        window.__allRecords = allRecords;
        window.__fullRecords = [...allRecords];
        const totalKWh = allRecords.reduce((s, r) => s + r.chargedKWh, 0);
        const totalAmount = allRecords.reduce((s, r) => s + r.amount, 0);
        const totalPaid = allRecords.reduce((s, r) => s + r.paid, 0);
        const dates = rawRecords.map(r => r.dateStr).sort();
        const reportCtx = { allRecords, fastRecords, slowRecords, totalKWh, totalAmount, totalPaid, batteryKWh, minDate: dates[0], maxDate: dates[dates.length - 1], slowKw, eff, homeCity };
        if (window.__activeCtx?._currentYear) reportCtx._currentYear = window.__activeCtx._currentYear;
        window.__reportCtx = reportCtx;
        window.__activeCtx = reportCtx;
        $('report').innerHTML = '';
        renderReport(reportCtx);
    }, 400);
}
$('efficiency').addEventListener('input', reprocessAndRerender);
$('batteryCap').addEventListener('input', reprocessAndRerender);
$('slowThreshold').addEventListener('input', reprocessAndRerender);

// ====== 常驻地变更实时重渲染 ======
$('homeCity').addEventListener('input', function() {
  const ctx = window.__activeCtx;
  if (!ctx) return;
  const homeCity = (this.value || '').trim() || '北京';
  window.__homeCity = homeCity;
  ctx.homeCity = homeCity;
  $('report').innerHTML = '';
  renderReport(ctx);
});

// ====== Update hero stats after data load ======
function updateHeroStats(ctx) {
  const el = $('heroStats');
  if (!el) return;
  const { allRecords, totalKWh, totalPaid } = ctx;
  const ecardAmt = parseFloat($('ecardAmount').value) || 0;
  const adjustedPaid = totalPaid + ecardAmt;
  const totalCnt = allRecords.length;
  const fastCnt = allRecords.filter(r => !r.isSlow).length;
  const slowCnt = allRecords.filter(r => r.isSlow).length;
  const cities = [...new Set(allRecords.filter(r => r.province && r.district && !isHomeCity(r, ctx.homeCity)).map(r => r.district))];
  const year = ctx._currentYear || '全部';

  // Monthly kWh for battery grid (all records)
  const byMonth = {};
  allRecords.forEach(r => {
    const d = new Date(r.startTime);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    byMonth[key] = (byMonth[key] || 0) + r.chargedKWh;
  });
  // 12 rows: by year or aggregated across years
  const monthLabels = ['01','02','03','04','05','06','07','08','09','10','11','12'];
  const monthValues = monthLabels.map(m => {
    if (ctx._currentYear) return byMonth[ctx._currentYear + '-' + m] || 0;
    let total = 0;
    for (const [key, val] of Object.entries(byMonth)) {
      if (key.endsWith('-' + m)) total += val;
    }
    return total;
  });
  const maxKwh = Math.max(...monthValues, 1);
  const startR = 0, startG = 158, startB = 247;  // cyan
  const endR = 0, endG = 179, endB = 131;         // green
  let gridHtml = '';
  for (let idx = 11; idx >= 0; idx--) {
    const raw = monthValues[idx];
    const cells = raw > 0 ? Math.round(raw / maxKwh * 10) : 0;
    const t = idx / 11;
    const r = Math.round(startR + (endR - startR) * t);
    const g = Math.round(startG + (endG - startG) * t);
    const b = Math.round(startB + (endB - startB) * t);
    let row = '';
    for (let i = 0; i < cells; i++) {
      row += `<div style="width:5px;height:28px;background:rgb(${r},${g},${b});flex-shrink:0"></div>`;
    }
    gridHtml += `<div style="display:flex;flex-direction:row-reverse;gap:2px;margin-bottom:5px;min-height:28px">${row}</div>`;
  }

  el.style.cssText = 'text-align:right';
  el.innerHTML = `
    <div style="display:flex;flex-direction:row;align-items:stretch;gap:28px;justify-content:flex-end;flex-wrap:wrap">
      <div style="flex-shrink:0">
        <div class="number" style="font-style:italic">${totalKWh.toFixed(0)}<span style="font-size:0.4em;vertical-align:super;letter-spacing:0;font-weight:300">.${String(totalKWh.toFixed(1)).split('.')[1]||0}</span></div>
        <div class="unit">kWh 总充电量</div>
        <div style="margin-top:24px;display:flex;flex-direction:column;gap:18px">
          <div class="meta-item"><div class="val cyan" style="font-size:36px;line-height:1;font-style:italic">${totalCnt}</div><div class="lbl" style="margin-top:4px">充电次数</div></div>
          <div class="meta-item"><div class="val green" style="font-size:36px;line-height:1;font-style:italic">${fastCnt}</div><div class="lbl" style="margin-top:4px">快充</div></div>
          <div class="meta-item"><div class="val" style="font-size:36px;line-height:1;color:var(--text-dim);font-style:italic">${slowCnt}</div><div class="lbl" style="margin-top:4px">慢充</div></div>
          <div class="meta-item"><div class="val coral" style="font-size:36px;line-height:1;font-style:italic">${adjustedPaid.toFixed(0)}</div><div class="lbl" style="margin-top:4px">实付(元)</div></div>
          <div class="meta-item"><div class="val" style="font-size:36px;line-height:1;font-style:italic;color:var(--amber)">${window.__trips ? window.__trips.length : 0}</div><div class="lbl" style="margin-top:4px">出行记录</div></div>
        </div>
        <div style="margin-top:6px;text-align:right;font-size:12px;color:var(--text-faint);letter-spacing:0.02em">${cities.length > 0 ? cities.slice(0, 6).join(' · ') : '—'}</div>${cities.length > 6 ? '<div style="text-align:right;font-size:12px;color:var(--text-faint);letter-spacing:0.02em">↵ ' + cities.slice(6).join(' · ') + '</div>' : ''}
        <div style="margin-top:4px;text-align:right;font-size:11px;color:var(--text-faint);font-family:var(--mono)">${year === '全部' ? '全部年份' : year + ' 年'}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-end;gap:0;opacity:0.9;filter:drop-shadow(0 0 8px rgba(0,158,247,0.12))">${gridHtml}</div>
    </div>`;
}

// ====== 下载数据模板 ======
function downloadTemplate() {
    const wb = XLSX.utils.book_new();
    const headers = ['充电站', '充电金额（元）', '实际支付金额（元）', '用电量（度）', '开始时间', '结束时间', '省市', '地区', '来源'];
    const samples = [
        ['国家电网·北京朝阳站', 30, 25, 26.5, '2025-06-01 10:30:00', '2025-06-01 11:15:00', '北京', '朝阳区', '国家电网'],
        ['特来电·济南历下站', 45, 40, 38.2, '2025-06-02 14:00:00', '2025-06-02 15:20:00', '山东', '济南', '特来电']
    ];
    const ws = XLSX.utils.aoa_to_sheet([headers, ...samples]);
    ws['!cols'] = headers.map(() => ({ wch: 20 }));
    XLSX.utils.book_append_sheet(wb, ws, '充电记录');
    XLSX.writeFile(wb, '充电记录模板.xlsx');
}

// ====== Event Listeners ======
$('fileInput').addEventListener('change', e => {
    if (e.target.files.length > 0) {
        $('fileName').textContent = '📄 ' + e.target.files[0].name;
        handleFile(e.target.files[0]);
    }
});

// Drag & drop
document.addEventListener('dragover', e => { e.preventDefault(); });
document.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && (file.name.endsWith('.xlsx') || file.name.endsWith('.xls'))) {
        $('fileName').textContent = '📄 ' + file.name;
        handleFile(file);
    }
});
