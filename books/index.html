            collect: [{"title":"远东冰原上的猫头鹰","alt":"https://book.douban.com/subject/36084463/","image":"https://minio.mythsman.com/douban/6ecdc6e5f3a35c0af2a5dc77d30dcb0d.jpg","meta":"[美]乔纳森·斯拉特 / 任晴 / 光启书局","rating":"2025-01-06 / ★★★☆☆ 还行","comment":"这本书我咋读不下去呢，有那么神吗？"},{"title":"西湖老照片","alt":"https://book.douban.com/subject/35297904/","image":"https://minio.mythsman.com/douban/66f11d8c311f2fc335d5940f0eeb7e87.jpg","meta":"林之 / 浙江摄影出版社","rating":"2025-01-06 / ★★★☆☆ 还行","comment":"最精彩的是那些老照片，文字倒像是前朝遗老的无病呻吟"},{"title":"君主论","alt":"https://book.douban.com/subject/34941359/","image":"https://minio.mythsman.com/douban/bae5797e6dc6e58aa6fa3231b0267497.jpg","meta":"[意] 马基雅维利 / 吕健忠 / 上海文化出版社 / 果麦文化","rating":"2025-01-06 / ★★★☆☆ 还行","comment":"不过是君主版的职场厚黑学。\n经常做君主的小伙伴都知道，这东西浅尝即可，如果照着它亦步亦趋的去做，无异于走火入魔。"},{"title":"阅读是一座随身携带的避难所","alt":"https://book.douban.com/subject/36271507/","image":"https://minio.mythsman.com/douban/ffa63b158609a6a692ebf74ab33455c4.jpg","meta":"[英] 毛姆 / 罗长利 / 万卷出版社 / 联合读创","rating":"2025-01-06 / ★★★★★ 力荐","comment":"虽然我不知道读了之后有什么收获，但是我知道还是有点收获的"},{"title":"毛泽东之魂","alt":"https://book.douban.com/subject/37074957/","image":"https://minio.mythsman.com/douban/fec9723266672f4fbe4edf4085c8d0ee.jpg","meta":"陈晋 / 人民出版社 / 东方出版社","rating":"2025-01-06 / ★★★★★ 力荐","comment":"此书或可叫做《毛泽东纪事本末》，从若干个主题对主席的言行进行了整理和介绍。\n读书的过程中最为震撼的是各种各样主席涉猎过的书名，有的压根听都没听过，有的尝试读了几页，只能惭愧的逐出书架，太难了😫。关键的关键这么多的书主席都读过，而且不止一遍，甚至有的还会背，我只好用“弱水三千，只取一瓢饮”、“开卷有益”这样的话安慰自己了…\n甚至一个暴论在我脑海渐渐涌现：主席让我们看到一个人类的上限能有多高。一个人是如何在繁杂的事务之外，还能有精力广泛涉猎，有所建树，非嗜书如命而何？非勤勉好学而何？由此可知那些地摊文不可信，因为他真的没有闲工夫。"},{"title":"红楼梦","alt":"https://book.douban.com/subject/1007305/","image":"https://minio.mythsman.com/douban/abf8cedde58037499fdb0e5ef55389d3.jpg","meta":"[清] 曹雪芹 著 / 高鹗 / 人民文学出版社","rating":"2025-01-06 / ★★★★★ 力荐","comment":"我请问那些对后四十回大放厥词的大手子们，想象一下，假如你们从没有听说过后四十回是“别人续作”，你们还能读出差别吗？\n话说，曾经也有一个世界未解之谜，有好多人喜欢可口可乐，也有不少人偏爱百事可乐，他们声称二者口味上有着这样那样的差别。后来有好事者就真的去做了个实验，他准备了若干杯可乐，不贴标签，让这些人辨别，结果没几个正确的。\n所以那些动不动这里不对劲那里不对劲的人，扪心自问一下，你真的看出差别了吗？还是像皇帝的新装里那些可怜的大人们，来彰显你那可怜的虚荣心？"},{"title":"银、剑、石","alt":"https://book.douban.com/subject/35388636/","image":"https://minio.mythsman.com/douban/ba355bd0da47d8979dbe01978f8e0953.jpg","meta":"[美] 玛丽· 阿拉纳 / 玛丽· 阿拉纳 / 林华 / 中信出版集团 / 新思文化","rating":"2025-01-06","comment":""},{"title":"筚路维艰","alt":"https://book.douban.com/subject/26171466/","image":"https://minio.mythsman.com/douban/46b75426600c60aef30d783c009a4742.jpg","meta":"萧冬连 / 社会科学文献出版社","rating":"2025-01-06 / ★★☆☆☆ 较差","comment":""},{"title":"王安石传","alt":"https://book.douban.com/subject/35635777/","image":"https://minio.mythsman.com/douban/4e659f24934796fc03353f6b50ec5618.jpg","meta":"崔铭 / 天津人民出版社","rating":"2024-12-10 / ★★★★★ 力荐","comment":"看完之后最讨厌司马光，学术有余，治国不足，就是一个道貌岸然，党同伐异的老顽固。"},{"title":"鲁迅杂文集","alt":"https://book.douban.com/subject/26697791/","image":"https://minio.mythsman.com/douban/48d85f558bc4d8977140b77707d37d47.jpg","meta":"鲁迅 / 天津人民出版社 / 果麦文化","rating":"2024-12-10 / ★★★★★ 力荐","comment":"终于领教先生杂文的笔力了"},{"title":"不被大风吹倒","alt":"https://book.douban.com/subject/36978314/","image":"https://minio.mythsman.com/douban/664dedb2d5df431f79f353dc7a4737c9.jpg","meta":"莫言 / 北京日报出版社 / 读客文化","rating":"2024-12-10 / ★☆☆☆☆ 很差","comment":"秃头余华，钻营小人"},{"title":"东京八平米","alt":"https://book.douban.com/subject/36096287/","image":"https://minio.mythsman.com/douban/3a15aab0292d70bac6b350bd42e4aaf0.jpg","meta":"[日]吉井忍 / 上海三联书店 / 理想国","rating":"2024-12-10 / ★★★☆☆ 还行","comment":"读来无感"},{"title":"Algorithms to Live By","alt":"https://book.douban.com/subject/26783732/","image":"https://minio.mythsman.com/douban/14ca56f823fe782c6d30fb0c687be0ec.jpg","meta":"Brian Christian / Tom Griffiths / Henry Holt and Co.","rating":"2024-04-14 / ★★★☆☆ 还行","comment":"既不深入，也不浅出。读后除了了解知道一些名字概念，什么也没有剩下。"},{"title":"天地九重：中国首飞航天员杨利伟自传 讲述一名普通少年成长为航天英雄的成长奋斗历程","alt":"https://book.douban.com/subject/36607881/","image":"https://minio.mythsman.com/douban/424dc3fd6169c4da55478913274f09db.jpg","meta":"杨利伟 / 研究出版社","rating":"2024-03-23 / ★★★★★ 力荐","comment":"聪明又努力的人怎么会不幸运呢 thsman.com/douban/ac8f42a4934443b1ef52ccda8c310091.jpg","meta":"[法] 米卡埃尔·洛奈（Mickaël Launay） / 欧瑜 / 人民邮电出版社 / 图灵新知","rating":"2023-12-18 / ★★★★★ 力荐","comment":"一本优秀的数学科普书，虽然有些内容没看懂。\n作者不时流露出的科学浪漫主义和豪情很是鼓舞人心。\n整部书文笔流畅，写作手法引人入胜，特别是关于相对论的论述，让人耳目一新。"},{"title":"经济学的思维方式","alt":"https://book.douban.com/subject/36243262/","image":"https://minio.mythsman.com/douban/93c2c34970ed349d03bc6f92a3b72a4b.jpg","meta":"[美] 保罗·海恩 / [美] 彼得·勃特克 / [美] 大卫·普雷契特科 / 鲁冬旭 / 浙江文艺出版社 / 果麦文化","rating":"2023-12-18 / ★★★★☆ 推荐","comment":"一本上好的经济学通俗读物，涵盖了日常能听到的经济学概念，比如沉没成本、边际成本、边际收益、比较优势等等，上半部分主要是理论，包含丰富的例子，后半部分对具体的经济事件进行分析和解读。"},{"title":"敦煌大历史","alt":"https://book.douban.com/subject/36152132/","image":"https://minio.mythsman.com/douban/4e7217293c9b01310400e3d9b262a7af.jpg","meta":"邢耀龙 / 北京联合出版公司 / 磨铁图书","rating":"2023-12-07 / ★★★★☆ 推荐","comment":"镶嵌在整个中国史的大背景下，使用明朝那些事儿风格写就的敦煌史"},{"title":"盛唐到底盛在哪儿","alt":"https://book.douban.com/subject/36546926/","image":"https://minio.mythsman.com/douban/e7429441a5cbb34087cae11593cf8c9d.jpg","meta":"于赓哲 / 江苏凤凰文艺出版社 / 读客文化","rating":"2023-12-01 / ★★★☆☆ 还行","comment":"浮光掠影的介绍了唐朝的一些事儿"},{"title":"杀死一只知更鸟","alt":"https://book.douban.com/subject/26879778/","image":"https://minio.mythsman.com/douban/13917911f0a7be5cc1a08feb55ec4ded.jpg","meta":"[美国] 哈珀·李 / 李育超 / 译林出版社","rating":"2023-10-26 / ★★★☆☆ 还行","comment":"絮絮叨叨，实在读不下去"},{"title":"中国常见植物野外识别手册（山东册）","alt":"https://book.douban.com/subject/3987165/","image":"https://minio.mythsman.com/douban/ecf65660b477d5eb48e88e59b0df0db8.jpg","meta":"刘冰 / 高等教育出版社","rating":"2023-10-25 / ★★★★★ 力荐","comment":"我买的不是书，我买的是故乡的风物"},{"title":"计算机程序的构造和解释(原书第2版)","alt":"https://book.douban.com/subject/1148282/","image":"https://minio.mythsman.com/douban/37773e4bb02938f3e32bdaec40cd209c.jpg","meta":"[美] Harold Abelson / [美] Gerald Jay Sussman / [美] Julie Sussman / 裘宗燕 / 机械工业出版社 / 华章科技","rating":"2023-10-23 / ★★★★★ 力荐","comment":"读过好久了，一本常读常新的书，它简明扼要的介绍了一些关于编程本质的东西。对了，不要忘了习题"},{"title":"认识商业","alt":"https://book.douban.com/subject/3922162/","image":"https://minio.mythsman.com/douban/ca2d49f6b3a402c177a6a643a48dff6e.jpg","meta":"[美] 威廉·尼科尔斯 / [美] 詹姆斯·麦克修 / [美] 苏珊·麦克修 / 陈智凯 / 黄启瑞 / 世界图书出版公司 / 后浪","rating":"2023-10-23 / ★★★☆☆ 还行","comment":"读过，但没留下有印象的东西"},{"title":"谈判","alt":"https://book.douban.com/subject/36044333/","image":"https://minio.mythsman.com/douban/34b7a66de9321e934222fe13eeeddd9f.jpg","meta":"[英] 盖温·肯尼迪 / 陈蓉 / 中信出版集团","rating":"2023-10-23 / ★★★★★ 力荐","comment":"我将此书列为孩子必读技能书的第三本"},{"title":"濮存昕：我和我的角色","alt":"https://book.douban.com/subject/36443697/","image":"https://minio.mythsman.com/douban/8925122b04675726b96bff632df4f086.jpg","meta":"濮存昕 / 人民文学出版社","rating":"2023-09-26 / ★★★★☆ 推荐","comment":"相信好多80，90后认识濮存昕都是从《英雄无悔》的高天开始的，好多人都说像自己的爸爸，或许一部分是形象，一部分是安全感吧。\n时间过的真快啊，童年印象中帅气的英雄都70多了，童年也离我越来越远了。\n读这本自传，仿佛跟随濮老师走过风风雨雨的几十年，上山下乡、回城、做演员、做公益……，看到了一个可爱可敬的人。"},{"title":"从戈尔巴乔夫到普京的俄罗斯道路","alt":"https://book.douban.com/subject/26299706/","image":"https://minio.mythsman.com/douban/6b01bf7a640c04590a08614b2d7def58.jpg","meta":"[美]大卫·M·科兹（David M.Kotz） / 弗雷德•威尔（Fred Weir） / 曹荣湘 等 / 中国人民大学出版社","rating":"2023-09-26 / ★★★★☆ 推荐","comment":"苏联解体罪魁祸首非戈尔巴乔夫和叶利钦莫属！他们一个是犹豫不决的懦夫和蠢货，另一个是志大才疏的野心家和伪君子！"},{"title":"大众哲学","alt":"https://book.douban.com/subject/33440005/","image":"https://minio.mythsman.com/douban/e033b91f5527b1425ea573c20e50d716.jpg","meta":"艾思奇 / 上海三联书店","rating":"2023-08-18 / ★★★★★ 力荐","comment":"一直以来，我都认为，一个人如果在某个领域造诣很高，他讲话应该是深入浅出的，要想深入浅出，少不了举例。一个人如果只会罗列概念，满嘴术语，说明他的水平其实还没到炉火垂青的地步。忘了是谁说的了，说是“最伟大的数学家能给邻居老奶奶讲述微积分”。\n本书就是这种旁征博引，深入浅出的类型，带着那个时代鲜明的语言特点，简单明了，单刀直入，怕你学不会，怕你不敢学，而不是像现在七绕八拐，怕你学会了，怕你读懂了，仿佛这样的话作者的水平就低了。"},{"title":"纸上卧游记","alt":"https://book.douban.com/subject/30334420/","image":"https://minio.mythsman.com/douban/e6e724b79270c07dc8ff181b64c40e63.jpg","meta":"熊逸 / 北京联合出版公司 / 联合读创","rating":"2023-08-18 / ★★☆☆☆ 较差","comment":"作者喜欢标榜自己，有点自以为是，清高，见不得多样性。作者一上来就煞费苦心把自己打造成一个超然物外，不问世事的淡泊形象，为后面“理性客观”的输出自己观点做铺垫。他旁征博引论证自己想论证的观点，而不顾及其本意，比如他孔对孔子对话的一些庸俗化解释，对城市中花园应该放任自流的观点，引用黑格尔关于中国没有哲学的观点，好多时候看似理性客观的在对比，在讨论，其实意有所指，只不过比较隐蔽。"},{"title":"摩托日记","alt":"https://book.douban.com/subject/36092576/","image":"https://minio.mythsman.com/douban/4ba67d996592e28fe038359a2f677a3e.jpg","meta":"[古] 切·格瓦拉 / 崔元涛 / 民主与建设出版社 / 竹石文化","rating":"2023-08-18 / ★★★★☆ 推荐","comment":"\"我们走后，他们会给你们修学校和医院，会提高你们的工资，这不是因为他们良心发现，也不是因为他们变成了好人，而是因为我们来过。\"这句话好多人都听说过，这句话就是切格瓦拉的名言，就像简介说的切的文字“通俗流畅，时而诗意盎然，时而诙谐幽默。”。\n看这本书，仿佛身临其境地跟着切一起在旅行，尽管大部分地名还是陌生的，甚至一些景观没有到过的人也很难想象，但一些人事还是能够感同身受的，切的描述很有“画面感”，有些场景让人“忍俊不禁”。\n这一刻他不是头像中那个目光深邃的革命家，而是一个调皮的年轻人，一个窘迫的旅行者…，顺便说一句，B站有同名电影，推荐大家观看。"},{"title":"哲学的故事","alt":"https://book.douban.com/subject/14439405/","image":"https://minio.mythsman.com/douban/d7fb870040f1e98fa269b6e64fc4e617.jpg","meta":"[美] 威尔·杜兰特 / 蒋剑峰 / 张程程 / 新星出版社 / 新经典文化","rating":"2023-08-14 / ★★★☆☆ 还行","comment":"我是个俗人，我读不懂"},{"title":"杂草记","alt":"https://book.douban.com/subject/26976924/","image":"https://minio.mythsman.com/douban/2f054d8f6c5038e0fe11f67afdec8c60.jpg","meta":"[日] 柳宗民 / 烨伊 / 虞辰 / 曹逸冰 / 四川文艺出版社 / 新经典文化","rating":"2023-08-14 / ★★★☆☆ 还行","comment":"日本人写的，植物名也是日文名，很少的共鸣，期待中国人自己写一本"},{"title":"锻炼","alt":"https://book.douban.com/subject/35949849/","image":"https://minio.mythsman.com/douban/abb017520ad2d6177b8861061490c092.jpg","meta":"[美]丹尼尔·利伯曼 / 谭杰 / 天津科学技术出版社 / 湛庐文化","rating":"2023-08-11 / ★★★★☆ 推荐","comment":"为了自己的身体，动起来，为了自己的脑子，动起来。\n对于大部分人，每周150分钟的中强度锻炼即可，多了没坏处，但也没多大用。大多数时间进行有氧运动，但也别忘了加入一些力量训练。\n总之，动起来你就会收益，无论是从生理上还是心理上。"},{"title":"掌控习惯","alt":"https://book.douban.com/subject/34326931/","image":"https://minio.mythsman.com/douban/1d40edcd2c5bf9f279587306500101db.jpg","meta":"[美] 詹姆斯·克利尔 / 迩东晨 / 北京联合出版公司 / 联合天畅","rating":"2023-08-11 / ★★★★☆ 推荐","comment":"让习惯显而易见；让习惯有吸引力；让习惯简便易行；让习惯令人愉悦，佐以坚持，积少成多，量变产生质变。"},{"title":"姥爷，我们天上见","alt":"https://book.douban.com/subject/35267441/","image":"https://minio.mythsman.com/douban/52fe043480c80c43bb3ecd7b405d2fec.jpg","meta":"蒋雯丽 / 天津人民出版社 / 果麦文化","rating":"2023-08-11 / ★★★★★ 力荐","comment":"大抵，人年龄渐长，经事渐多，心境越来越平和，对好多事都变得不喜不悲，甚至有时候听到亲人离世的瞬间，也不是悲伤，而是恍惚，继而是空荡。\n眼泪这种稀罕物，似乎只停留在了一些触景生情、睹物思人的不经意间。苍蝇小馆中的一口面，街边小店中的一件衣服，火车上陌生人的一个身影，旁人不经意的一句话，突然就让你想起了一位故人……\n或许就像那句话说的：虽然我不常提起他，但是我时常想起他。\n蒋雯丽老师的这本书，文笔细腻，节奏明快，感人至深，是一本不可多得的回忆佳作！"},{"title":"绿灯","alt":"https://book.douban.com/subject/35543078/","image":"https://minio.mythsman.com/douban/9c7b711e1f1f21dbe90cf6322151eb95.jpg","meta":"马修·麦康纳 / 李函 / 堡壘文化","rating":"2023-08-11 / ★★★★☆ 推荐","comment":"马修，一个认真生活的人，活出了真实，活出了自我。"},{"title":"飓风掠过蔗田","alt":"https://book.douban.com/subject/35728439/","image":"https://minio.mythsman.com/douban/4db3310dca48e278d278ab7e4dfe481b.jpg","meta":"刘骁骞 / 北京联合出版公司 / 有风文化","rating":"2023-08-11 / ★★★☆☆ 还行","comment":"刘骁骞久闻其名，也看过他的报道，印象中是孤身一人探访黑帮还是毒枭，记不清了。看起来阳光秀气，和黑帮、毒枭形成了一种巨大的反差，很佩服他的新闻精神和胆识，也让我记住了这个名字。\n但这本书我读了几章却不好读，感觉文笔不太流畅，有一种译文般的生涩感，说话有点拿腔拿调，不太应该。\n按说新闻记者都是长于口才、文才的，特别是这么年轻有为的记者。不知是不是刻意为之，如果是这样，请好好说话吧，就像平时报道那样，用不着装深沉，发感想，就像平常那样挺好的。"},{"title":"运动改造大脑","alt":"https://book.douban.com/subject/25755874/","image":"https://minio.mythsman.com/douban/97a2228bd07e6b41b8d551702a7bc1ae.jpg","meta":"[美] 约翰•瑞迪（John Ratey） / 埃里克•哈格曼（Eric Hagerman） / 浦溶 / 浙江人民出版社 / 湛庐文化","rating":"2023-08-11 / ★★★☆☆ 还行","comment":"总感觉谈运动少了点，谈病理、生物、化学多了点，看着看着像读生物教科书一样。"},{"title":"总会变好的：如何靠自己摆脱强迫症（壹心理公开课）","alt":"https://book.douban.com/subject/35077626/","image":"https://minio.mythsman.com/douban/77a2074c4be8ff2180ae50464a5e1ea2.jpg","meta":"黄爱国 / 中国法制出版社","rating":"2023-08-11 / ★★★★★ 力荐","comment":"千言万语汇成一句话就是：顺其自然。怎么顺呢？不要害怕，少想多做。什么是自然？不刻意，不强求。"},{"title":"突围原生家庭","alt":"https://book.douban.com/subject/34455912/","image":"https://minio.mythsman.com/douban/09b2fe3385d3a29d072775f252deff8a.jpg","meta":"斯蒂芬妮▪斯蒂尔 / 胡静 / 北京联合出版公司","rating":"2023-08-11 / ★★★★☆ 推荐","comment":"值得推荐，匆匆读完，我更了解自己了。但是也需要提防拿着锤子，看什么都是钉子的谬误。"},{"title":"当下的力量（白金版）","alt":"https://book.douban.com/subject/26815948/","image":"https://minio.mythsman.com/douban/49c7ae61008c38cb5803f2f267912e1f.jpg","meta":"[德]埃克哈特•托利 / 曹植 / 中信出版社","rating":"2023-08-11 / ★★☆☆☆ 较差","comment":"缺少示例，净是干巴巴的阐述和说教。"},{"title":"认知觉醒","alt":"https://book.douban.com/subject/35193035/","image":"https://minio.mythsman.com/douban/1dc969d252bdc98b46d03d5c6da9e984.jpg","meta":"周岭 / 人民邮电出版社 / 智元微库 OPEN MIND","rating":"2023-08-11 / ★★★★★ 力荐","comment":"我要将此书定为孩子应读的第二本技能书。"},{"title":"邓小平时代","alt":"https://book.douban.com/subject/20424526/","image":"https://minio.mythsman.com/douban/9b926e4e1ec052d6dc74af0decc910d8.jpg","meta":"[美] 傅高义 / 冯克利 / 生活·读书·新知三联书店","rating":"2023-08-11 / ★★★★★ 力荐","comment":"我承认之前我对小平是有成见的，成见的源自他对教员政策的改弦更张以及关于他的儿子邓朴方的一些传言，但是在我看完《从戈尔巴乔夫到普京的俄罗斯道路》回过头来再看这本书，我有点理解小平了。他所说的一些话，比如贫穷不是社会主义，科学技术是第一生产力等是符合当时的国际背景和社会现实的。小平的所作所为无愧于这个国家和人民，和教员是一脉相承的。"},{"title":"重来","alt":"https://book.douban.com/subject/5320866/","image":"https://minio.mythsman.com/douban/06cd7de7b047b2536b461c8d2f35ef1f.jpg","meta":"[美] 贾森·弗里德 / [丹] 戴维·海涅迈尔·汉森 / 李瑜偲 / 中信出版社","rating":"2023-08-11 / ★★★★★ 力荐","comment":"这本书输出一些有意思的观点，但是适用场景可能只是那些小型或微型公司，有待后面慢慢观察验证"},{"title":"论中国","alt":"https://book.douban.com/subject/26607419/","image":"https://minio.mythsman.com/douban/79f23ee4f1d10f53f4f9f2999bebc396.jpg","meta":"[美] 亨利·基辛格 / 胡利平 / 中信出版社","rating":"2023-08-11 / ★★★☆☆ 还行","comment":"可以提供一个观察中国的外部视角，但也要分辨其中的真伪。其中有些明显能感觉到老基一知半解，另一些估计就是恶意曲解了。总的来说，有些启发。"},{"title":"菊与刀","alt":"https://book.douban.com/subject/6972974/","image":"https://minio.mythsman.com/douban/df4b624d129de36af3420c0b995ce527.jpg","meta":"[美国] 鲁思·本尼迪克特 / 潘星汉 / 新世界出版社","rating":"2023-08-11 / ★★★★★ 力荐","comment":"报恩与复仇，压抑和放纵，忠诚和背叛，礼貌与冷漠…，日本人总是在事物的两个极端来回摇摆，导致日本人无时无刻不活在矛盾当中，进而形成一种外人看起来非常扭曲的人格，至于为什么就日本形成了这种鲜明的性格那就不得而知了"},{"title":"人类简史","alt":"https://book.douban.com/subject/25985021/","image":"https://minio.mythsman.com/douban/73c0c171203951b1bc9b8189731a3a73.jpg","meta":"[以色列] 尤瓦尔·赫拉利 / 林俊宏 / 中信出版社 / 见识城邦","rating":"2023-08-11 / ★★★★☆ 推荐","comment":"可能之前对前三部分的内容多多少少有些涉猎，读起来没那么惊艳，第四部分不知道作者是不是也渐入佳境，读来令人很受震撼，总之推荐大家看看，有不少新的输入"},{"title":"国家与革命","alt":"https://book.douban.com/subject/26716508/","image":"https://minio.mythsman.com/douban/82c64e485ed7663c0f5f1f31d96f6905.jpg","meta":"列宁 / 中共         }

        let nav = {
            page: 0,
            pageMax: 1,
            action: 'collect'
        }

        let meta_max_line = 4;
        let item_per_page = 10;

        // ======== index ========

        function tabClick(node, action) {
            for (let childNode of node.parentNode.children) {
                if (childNode.classList.contains('hexo-douban-tab-' + action)) {
                    childNode.classList.add('hexo-douban-tab-active');
                } else {
                    childNode.classList.remove('hexo-douban-tab-active');
                }
            }

            renderList(action, 1)
        }


        // ======== pagination ========
        (function initPagination() {
            let firstpage = document.querySelector(".hexo-douban-firstpage");
            let previouspage = document.querySelector(".hexo-douban-previouspage");
            let nextpage = document.querySelector(".hexo-douban-nextpage");
            let lastpage = document.querySelector(".hexo-douban-lastpage");

            //add listener
            firstpage.onclick = () => renderList(nav.action, 1);
            previouspage.onclick = () => renderList(nav.action, Math.max(1, nav.page - 1));
            nextpage.onclick = () => renderList(nav.action, Math.min(nav.page + 1, nav.pageMax));
            lastpage.onclick = () => renderList(nav.action, nav.pageMax);
        })();


        // ======== init index ========

        (function initIndex() {
            let tabDo = document.querySelector(".hexo-douban-tab-do");
            tabDo.onclick = () => tabClick(tabDo, 'do');

            let tabWish = document.querySelector(".hexo-douban-tab-wish");
            tabWish.onclick = () => tabClick(tabWish, 'wish');

            let tabCollect = document.querySelector(".hexo-douban-tab-collect");
            tabCollect.onclick = () => tabClick(tabCollect, 'collect');

            tabCollect.click();
        })();

        // ======== render ========
        function renderList(action, page) {
            if (action === nav.action && page === nav.page) {
                return
            }
            nav.page = page
            nav.pageMax = Math.max(1, Math.floor((data[action].length - 1) / item_per_page) + 1)
            nav.action = action

            document.querySelector('.hexo-douban-pagenum').textContent = `${nav.page} / ${nav.pageMax}`

            let container = document.querySelector('.hexo-douban-items')
            container.innerHTML = ''
            for (let i = (page - 1) * item_per_page; i < Math.min(page * item_per_page, data[action].length); i++) {
                container.append(renderItem(action, data[action][i]))
            }
        }

        function renderItem(action, data) {
            let item = document.createElement('div')
            item.className = 'hexo-douban-item'

            let picture = document.createElement('div')
            picture.className = 'hexo-douban-picture'

            let img = document.createElement('img')
            img.src = data.image
            img.loading = 'lazy'
            img.referrerPolicy = 'no-referrer'
            picture.append(img)

            let info = document.createElement('div')
            info.className = 'hexo-douban-info'

            let title = document.createElement('div')
            title.className = 'hexo-douban-title'

            let link = document.createElement('a')
            link.href = data.alt
            link.target = '_blank'
            link.textContent = data.title
            title.append(link)

            let meta = document.createElement('div')
            meta.className = 'hexo-douban-meta'
            meta.textContent = data.meta
            meta.setAttribute('style', `-webkit-line-clamp: ${meta_max_line}`);

            let rating = document.createElement('div')
            rating.className = 'hexo-douban-rating'
            rating.textContent = data.rating

            let comment = document.createElement('div')
            comment.className = 'hexo-douban-comment'
            comment.textContent = data.comment

            info.append(title, meta, rating, comment)

            item.append(picture, info)
            return item
        }

    })();
